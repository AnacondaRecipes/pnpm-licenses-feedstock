{% set name = "pnpm-licenses" %}
{% set version = "2.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://registry.npmjs.org/@quantco/pnpm-licenses/-/pnpm-licenses-{{ version }}.tgz
  sha256: 33a269335fc0d6d0e265cde2b4a76c534751a60594fab1a692ece561456af19c

build:
  number: 0

requirements:
  build:
    - nodejs
  host:
    - nodejs
    - pnpm >=8.6.12
  run:
    - nodejs

test:
  commands:
    - pnpm-licenses --version
    - test -d $PREFIX/lib/node_modules/@quantco/pnpm-licenses  # [unix]
    - if not exist %LIBRARY_INC%\share\pnpm-licenses\node_modules\.bin\pnpm-licenses.cmd exit 1  # [win]

about:
  home: https://github.com/Quantco/pnpm-licenses
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Generate third party license disclaimers in pnpm-based projects
  description: This is a CLI tool for generating lists of licenses for all dependencies of a project using pnpm.
  doc_url: https://github.com/Quantco/pnpm-licenses/blob/main/readme.md
  dev_url: https://github.com/Quantco/pnpm-licenses

extra:
  recipe-maintainers:
    - JaninaWibkerQC
    - pavelzw
    - xhochy
  skip-lints:
    - host_section_needs_exact_pinnings
